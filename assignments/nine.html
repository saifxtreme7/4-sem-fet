<!DOCTYPE html>
<html>
<head>
    <title>Student Feedback Form</title>

    <style>

        body{
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container{
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
        }

        h2{
            text-align: center;
            color: darkblue;
        }

        label{
            font-weight: bold;
        }

        input, select, textarea{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid gray;
        }

        input[type="checkbox"],
        input[type="radio"]{
            width: auto;
        }

        button{
            background: darkblue;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: navy;
        }

        #result{
            margin-top: 20px;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Student Feedback Form</h2>

    <form id="myForm">

        <fieldset>

            <legend>Student Details</legend>

            <label>Name:</label>
            <input type="text" id="name">

            <label>Email:</label>
            <input type="email" id="email">

            <label>Course:</label>

            <select id="course">
                <option>Java</option>
                <option>HTML</option>
                <option>SQL</option>
            </select>

            <label>Gender:</label><br>

            <input type="radio" name="gender" value="Male"> Male

            <input type="radio" name="gender" value="Female"> Female

            <br><br>

            <label>
                <input type="checkbox" id="subscribe">
                Subscribe Newsletter
            </label>

            <br><br>

            <label>Message:</label>

            <textarea id="message"></textarea>

            <br>

            <button type="submit">
                Submit
            </button>

        </fieldset>

    </form>

    <div id="result">

        <h3>Submitted Details</h3>

        <p id="output"></p>

    </div>

    <br>

    <a href="https://github.com/saifxtreme7/4-sem-fet">
        Home Page
    </a>

</div>

<script>

document.getElementById("myForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    let name =
    document.getElementById("name").value;

    let email =
    document.getElementById("email").value;

    let course =
    document.getElementById("course").value;

    let message =
    document.getElementById("message").value;

    let gender = "";

    let genderButtons =
    document.getElementsByName("gender");

    for(let i = 0; i < genderButtons.length; i++){

        if(genderButtons[i].checked){

            gender = genderButtons[i].value;

        }

    }

    let subscribe =
    document.getElementById("subscribe").checked
    ? "Yes" : "No";

    document.getElementById("result").style.display =
    "block";

    document.getElementById("output").innerHTML =
    "Name: " + name + "<br>" +
    "Email: " + email + "<br>" +
    "Course: " + course + "<br>" +
    "Gender: " + gender + "<br>" +
    "Subscribed: " + subscribe + "<br>" +
    "Message: " + message;

});

</script>

</body>
</html>
