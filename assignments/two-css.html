<!DOCTYPE html>
<html>
<head>
  <title>Skills Matrix</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, white, aliceblue);
    }

    .container {
      width: 420px;
      margin: auto;
      padding: 25px;
      background: white;
      border: 1px solid lightblue;
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      color: teal;
      margin-top: 0;
      padding-bottom: 10px;
      border-bottom: 2px solid lightblue;
      letter-spacing: 1px;
    }

    ol {
      padding-left: 20px;
      color: black;
    }

    li {
      margin: 10px 0;
    }

    b {
      color: teal;
    }

    ul li {
      color: darkslategray;
    }

    hr {
      border: none;
      height: 1px;
      background: lightblue;
      margin-top: 15px;
    }

    .link {
      text-align: center;
      margin-top: 15px;
    }

    a {
      text-decoration: none;
      color: teal;
      border: 1px solid teal;
      padding: 8px 14px;
      display: inline-block;
      border-radius: 5px;
      transition: 0.3s;
    }

    a:hover {
      background: teal;
      color: white;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>SKILLS MATRIX</h1>

    <ol>
      <li>
        <b>Programming Languages</b>
        <ul>
          <li>Java</li>
          <li>C</li>
        </ul>
      </li>

      <li>
        <b>Web Development</b>
        <ul>
          <li>HTML</li>
        </ul>
      </li>

      <li>
        <b>Database</b>
        <ul>
          <li>SQL</li>
        </ul>
      </li>

      <li>
        <b>Tools</b>
        <ul>
          <li>GitHub</li>
          <li>VS Code</li>
        </ul>
      </li>
    </ol>

    <hr>

    <div class="link">
      <a href="https://github.com/saifxtreme7/4-sem-fet">HOME PAGE</a>
    </div>

  </div>

</body>
</html>
