<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>

    <style>

        /* BODY */
        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:linear-gradient(to right,#141e30,#243b55);

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
        }

        /* PLAYER BOX */
        .player{
            width:350px;

            background:white;

            border-radius:20px;

            padding:25px;

            text-align:center;

            box-shadow:0px 8px 20px rgba(0,0,0,0.4);
        }

        /* TITLE */
        h1{
            color:#222;
            margin-bottom:20px;
        }

        /* SONG IMAGE */
        .song-image{
            width:220px;
            height:220px;

            margin:auto;

            border-radius:20px;

            overflow:hidden;

            box-shadow:0px 5px 15px rgba(0,0,0,0.3);
        }

        .song-image img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        /* SONG NAME */
        .song-name{
            margin-top:20px;
            font-size:25px;
            font-weight:bold;
            color:#333;
        }

        /* ARTIST */
        .artist{
            color:gray;
            margin-top:5px;
        }

        /* BUTTON AREA */
        .buttons{
            margin-top:25px;
        }

        /* BUTTONS */
        button{
            padding:12px 18px;

            margin:5px;

            border:none;

            border-radius:10px;

            background:#243b55;

            color:white;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{
            background:#141e30;
            transform:scale(1.08);
        }

        /* STATUS */
        .status{
            margin-top:20px;
            padding:12px;

            background:#f1f5f9;

            border-radius:10px;

            font-weight:bold;

            color:#222;
        }

    </style>
</head>

<body>

    <!-- PLAYER -->
    <div class="player">

        <h1>Music Player  😁😂🤣🎵</h1>

        <!-- IMAGE -->
        <div class="song-image">

            <img id="image"
            src="https://picsum.photos/300?random=1">

        </div>

        <!-- SONG DETAILS -->
        <div class="song-name" id="songName">
            Shape of You
        </div>

        <div class="artist" id="artistName">
            Ed Sheeran
        </div>

        <!-- BUTTONS -->
        <div class="buttons">

            <button onclick="previousSong()">
                ⏮
            </button>

            <button onclick="playSong()">
                ▶
            </button>

            <button onclick="nextSong()">
                ⏭
            </button>

        </div>

        <!-- STATUS -->
        <div class="status" id="status">
            Music Stopped
        </div>

    </div>

    <script>

        /* SONG ARRAY */

        let songs = [

            {
                name:"Shape of You",
                artist:"Ed Sheeran",
                image:"https://picsum.photos/300?random=1"
            },

            {
                name:"Believer",
                artist:"Imagine Dragons",
                image:"https://picsum.photos/300?random=2"
            },

            {
                name:"Blinding Lights",
                artist:"The Weeknd",
                image:"https://picsum.photos/300?random=3"
            }

        ];

        /* CURRENT SONG */
        let current = 0;

        /* SHOW SONG FUNCTION */

        function showSong(){

            document.getElementById("songName").innerHTML =
            songs[current].name;

            document.getElementById("artistName").innerHTML =
            songs[current].artist;

            document.getElementById("image").src =
            songs[current].image;

        }

        /* NEXT SONG */

        function nextSong(){

            current++;

            if(current >= songs.length){

                current = 0;

            }

            showSong();

        }

        /* PREVIOUS SONG */

        function previousSong(){

            current--;

            if(current < 0){

                current = songs.length - 1;

            }

            showSong();

        }

        /* PLAY BUTTON */

        function playSong(){

            document.getElementById("status").innerHTML =
            "▶ Now Playing";

        }

    </script>

</body>
</html>
