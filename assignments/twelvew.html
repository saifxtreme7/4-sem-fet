<!DOCTYPE html>
<html>
<head>
    <title>Login System</title>

    <style>

        body{
            background-color: #dbeafe;
            font-family: Arial;
            text-align: center;
            padding-top: 120px;
        }

        .container{
            background-color: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
        }

        h1{
            color: darkblue;
        }

        p{
            color: #444;
        }

        button{
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: darkblue;
            color: white;
            cursor: pointer;
        }

        button:hover{
            background-color: navy;
        }

        #message{
            margin-top: 20px;
            font-weight: bold;
            color: darkred;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Secure Login 🔒</h1>

        <p>
            Click the button to verify password
        </p>

        <button onclick="startLogin()">
            Login
        </button>

        <div id="message"></div>

    </div>

    <script>

        function startLogin(){

            let password;

            let attempts = 0;

            do{

                password = prompt("Enter Password");

                attempts++;

                if(password != "1234"){

                    alert("Invalid Password");

                }

            }

            while(password != "1234" && attempts < 3);

            if(password == "1234"){

                document.getElementById("message").innerHTML =
                "✅ Login Successful";

            }

            else{

                document.getElementById("message").innerHTML =
                "❌ Access Denied";

            }

        }

    </script>

</body>
</html>
